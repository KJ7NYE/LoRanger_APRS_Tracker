; ============================================================================
; nRF52 platform defaults
; ----------------------------------------------------------------------------
; Standalone block (does NOT extend [common] which carries ESP32-specific
; lib_deps like NimBLE/AsyncTCP/ESPAsyncWebServer/esp-logger). nRF52 variants
; reference ${nrf52_common.build_flags} / ${nrf52_common.lib_deps}.
;
; The HAS_WIFI / HAS_NIMBLE / HAS_WEB_UI capability flags are deliberately
; *not* defined here — those subsystems don't exist on nRF52 and the
; capability gates added in PR-1 step 1 keep the corresponding code out.
;
; HAS_BT_CLASSIC / HAS_TOUCHSCREEN remain per-variant in board_pinout.h
; (they're hardware capabilities, not platform).
; ============================================================================
[nrf52_common]
extra_scripts =
	pre:tools/embed_config.py
build_flags =
	-Werror -Wall
	; gcc-arm-none-eabi flags signed/unsigned comparisons that gcc-xtensa lets pass.
	; The codebase has many millis()/uint32_t vs signed-int * 1000 expressions and
	; container index loops; cleaning these up is its own refactor. Punt for now.
	-Wno-sign-compare
	-D SERIAL_BUFFER_SIZE=16384
	-D RADIOLIB_EXCLUDE_CC1101=1
	-D RADIOLIB_EXCLUDE_RF69=1
	-D RADIOLIB_EXCLUDE_RFM2X=1
	-D RADIOLIB_EXCLUDE_SX1231=1
	-D RADIOLIB_EXCLUDE_SX1233=1
	-D RADIOLIB_EXCLUDE_SI443X=1
	-D RADIOLIB_EXCLUDE_NRF24=1
	-D RADIOLIB_EXCLUDE_AFSK=1
	-D RADIOLIB_EXCLUDE_APRS=1
	-D RADIOLIB_EXCLUDE_AX25=1
	-D RADIOLIB_EXCLUDE_BELL=1
	-D RADIOLIB_EXCLUDE_FSK4=1
	-D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
	-D RADIOLIB_EXCLUDE_LORAWAN=1
	-D RADIOLIB_EXCLUDE_MORSE=1
	-D RADIOLIB_EXCLUDE_PAGER=1
	-D RADIOLIB_EXCLUDE_DIRECT_RECEIVE=1
	-D RADIOLIB_EXCLUDE_RTTY=1
	-D RADIOLIB_EXCLUDE_SSTV=1
	-I variants/${PIOENV}
	-I include/nrf52_shims
lib_deps =
	adafruit/Adafruit BusIO @ 1.16.1
	adafruit/Adafruit Unified Sensor @ 1.1.15
	adafruit/Adafruit BME280 Library @ 2.3.0
	adafruit/Adafruit BMP280 Library @ 3.0.0
	adafruit/Adafruit BME680 Library @ 2.0.6
	bblanchon/ArduinoJson @ 7.4.2
	jgromes/RadioLib @ 7.6.0
	mikalhart/TinyGPSPlus @ 1.0.3
	paulstoffregen/Time @ 1.6.1
	shaggydog/OneButton @ 1.5.0
display_libs =
	adafruit/Adafruit GFX Library @ 1.11.9
	adafruit/Adafruit ST7735 and ST7789 Library @ 1.10.4

[common]
build_flags =
	-Werror -Wall
	-D HAS_WIFI=1
	-D HAS_NIMBLE=1
	-D HAS_WEB_UI=1
	-D HAS_DISPLAY=1
	-D RADIOLIB_EXCLUDE_CC1101=1
	-D RADIOLIB_EXCLUDE_RF69=1
	-D RADIOLIB_EXCLUDE_RFM2X=1
	-D RADIOLIB_EXCLUDE_SX1231=1
	-D RADIOLIB_EXCLUDE_SX1233=1
	-D RADIOLIB_EXCLUDE_SI443X=1
	-D RADIOLIB_EXCLUDE_NRF24=1
	-D RADIOLIB_EXCLUDE_AFSK=1
	-D RADIOLIB_EXCLUDE_APRS=1
	-D RADIOLIB_EXCLUDE_AX25=1
	-D RADIOLIB_EXCLUDE_BELL=1
	-D RADIOLIB_EXCLUDE_FSK4=1
	-D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
	-D RADIOLIB_EXCLUDE_LORAWAN=1
	-D RADIOLIB_EXCLUDE_MORSE=1
	-D RADIOLIB_EXCLUDE_PAGER=1
	-D RADIOLIB_EXCLUDE_DIRECT_RECEIVE=1
	-D RADIOLIB_EXCLUDE_RTTY=1
	-D RADIOLIB_EXCLUDE_SSTV=1
	-I variants/${PIOENV}
lib_deps =
	adafruit/Adafruit BusIO @ 1.16.1
	adafruit/Adafruit Unified Sensor @ 1.1.15
	adafruit/Adafruit BME280 Library @ 2.3.0
	adafruit/Adafruit BMP280 Library @ 3.0.0
	adafruit/Adafruit BME680 Library @ 2.0.6
	bblanchon/ArduinoJson @ 7.4.2
	h2zero/NimBLE-Arduino @ 1.4.1
	jgromes/RadioLib @ 7.6.0
	ESP32Async/AsyncTCP @ 3.4.10
	ESP32Async/ESPAsyncWebServer @ 3.10.0
	mikalhart/TinyGPSPlus @ 1.0.3
	paulstoffregen/Time @ 1.6.1
	peterus/esp-logger @ 1.0.0
	shaggydog/OneButton @ 1.5.0
display_libs =
	adafruit/Adafruit GFX Library @ 1.11.9
	adafruit/Adafruit SSD1306 @ 2.5.10
usb_flags=
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1